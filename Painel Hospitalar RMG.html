document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Painel Hospitalar — Complexo Hospitalar Prefeito Edivaldo Orsi<\u002Ftitle>\n  \n  <script src=\"e6413d33-b23e-4d5a-aca0-d047fbbcd037\"><\u002Fscript>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n    :root {\n      --bg:#f0f2f5; --surface:#fff; --surface2:#f7f8fa; --border:#e2e5ea;\n      --text:#1e2433; --muted:#6b7280;\n      --blue:#2B97D1; --yellow:#F4C400; --lime:#8CC63F; --red:#E85A2A;\n      --teal:#0d9488; --purple:#7c3aed; --orange:#f97316;\n      --radius:10px; --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);\n    }\n    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; font-size:14px; }\n\n    header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 28px; display:flex; align-items:stretch; justify-content:space-between; box-shadow:var(--shadow); }\n    .h-logo { display:flex; align-items:center; padding:10px 20px 10px 0; border-right:1px solid var(--border); }\n    .h-logo img { height:48px; }\n    .h-title { display:flex; flex-direction:column; justify-content:center; padding-left:20px; }\n    .h-title strong { font-size:15px; font-weight:700; }\n    .h-title span { font-size:11px; color:var(--muted); margin-top:1px; }\n    .h-right { display:flex; align-items:center; gap:20px; padding:10px 0; }\n    #clock { font-size:22px; font-weight:700; color:var(--blue); letter-spacing:1px; line-height:1; }\n    #dateLabel { font-size:11px; color:var(--muted); margin-top:3px; text-align:right; }\n\n    main { padding:22px 28px; display:flex; flex-direction:column; gap:22px; }\n    .row2  { display:grid; grid-template-columns:1fr 1fr; gap:18px; }\n    .row3  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; }\n    .row4  { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }\n    .row5  { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; }\n    .row32 { display:grid; grid-template-columns:2fr 1fr; gap:18px; }\n    @media(max-width:960px){ .row2,.row3,.row4,.row5,.row32{ grid-template-columns:1fr; } }\n\n    .section-title {\n      font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.7px;\n      color:var(--muted); display:flex; align-items:center; gap:8px; margin-bottom:12px;\n    }\n    .section-title::before { content:''; display:block; width:3px; height:14px; border-radius:2px; background:var(--accent,var(--blue)); }\n\n    /* ── Módulo header ── */\n    .mod-header {\n      display:flex; align-items:center; gap:12px; padding:10px 18px;\n      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);\n      box-shadow:var(--shadow); margin-bottom:14px;\n    }\n    .mod-header-bar { width:4px; height:28px; border-radius:3px; flex-shrink:0; }\n    .mod-header-title { font-size:14px; font-weight:700; }\n    .mod-header-sub { font-size:11px; color:var(--muted); margin-top:2px; }\n\n    /* ── KPI ── */\n    .kpi { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); position:relative; overflow:hidden; }\n    .kpi::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:var(--accent,var(--blue)); border-radius:0 0 var(--radius) var(--radius); }\n    .kpi-icon { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:13px; margin-bottom:7px; background:color-mix(in srgb,var(--accent,var(--blue)) 12%,transparent); }\n    .kpi-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }\n    .kpi-value { font-size:28px; font-weight:800; line-height:1.05; margin-top:2px; }\n    .kpi-sub   { font-size:10px; color:var(--muted); margin-top:3px; }\n\n    /* ── Card ── */\n    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }\n    .card-header { padding:10px 16px; border-bottom:1px solid var(--border); background:var(--surface2); }\n    .card-body   { padding:16px; }\n    .chart-wrap    { position:relative; height:190px; }\n    .chart-wrap-sm { position:relative; height:150px; }\n\n    /* ── Unit panel ── */\n    .unit-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }\n    .unit-panel-header { padding:10px 16px; border-bottom:2px solid var(--accent,var(--teal)); background:color-mix(in srgb,var(--accent,var(--teal)) 6%,var(--surface2)); }\n    .unit-panel-title { font-size:13px; font-weight:700; }\n    .unit-panel-sub   { font-size:11px; color:var(--muted); margin-top:2px; }\n    .unit-panel-body  { padding:14px; display:flex; flex-direction:column; gap:14px; }\n\n    /* ── Horizontal bars ── */\n    .hbar-list { display:flex; flex-direction:column; gap:8px; }\n    .hbar-row  { display:flex; align-items:center; gap:8px; }\n    .hbar-label { font-size:11px; color:var(--muted); width:150px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }\n    .hbar-label-sm { font-size:11px; color:var(--muted); width:80px; flex-shrink:0; }\n    .hbar-track { flex:1; background:var(--surface2); border-radius:4px; height:18px; overflow:hidden; border:1px solid var(--border); }\n    .hbar-fill  { height:100%; border-radius:3px; display:flex; align-items:center; padding-left:6px; font-size:10px; font-weight:700; color:#fff; transition:width .6s ease; min-width:20px; }\n    .hbar-val   { font-size:11px; font-weight:700; width:28px; text-align:right; flex-shrink:0; color:var(--text); }\n\n    /* ── Stat rows ── */\n    .stat-list { display:flex; flex-direction:column; gap:7px; }\n    .stat-row  { display:flex; align-items:center; justify-content:space-between; padding:8px 11px; background:var(--surface2); border-radius:7px; border:1px solid var(--border); }\n    .stat-label { font-size:12px; font-weight:500; }\n    .stat-right { display:flex; align-items:center; gap:10px; }\n    .stat-total { font-size:16px; font-weight:800; }\n    .stat-sub   { font-size:10px; color:var(--muted); }\n\n    /* ── Situação badges ── */\n    .sit-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:99px; font-size:10px; font-weight:700; border:1px solid transparent; }\n    .sit-dot   { width:6px; height:6px; border-radius:50%; }\n    .s-AGND{background:#eff6ff;color:#1e40af;border-color:#bfdbfe} .s-AGND .sit-dot{background:#3b82f6}\n    .s-CHAM{background:#fefce8;color:#854d0e;border-color:#fde68a} .s-CHAM .sit-dot{background:#f59e0b}\n    .s-PREP{background:#fff7ed;color:#9a3412;border-color:#fed7aa} .s-PREP .sit-dot{background:#f97316}\n    .s-TRAN{background:#fdf4ff;color:#6b21a8;border-color:#e9d5ff} .s-TRAN .sit-dot{background:#a855f7}\n    .s-RZDA{background:#f0fdf4;color:#166534;border-color:#bbf7d0} .s-RZDA .sit-dot{background:#22c55e}\n    .s-CANC{background:#fef2f2;color:#991b1b;border-color:#fecaca} .s-CANC .sit-dot{background:#ef4444}\n\n    /* ── Table ── */\n    .dash-table { width:100%; border-collapse:collapse; }\n    .dash-table th { background:var(--surface2); padding:7px 11px; text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); border-bottom:2px solid var(--border); }\n    .dash-table td { padding:8px 11px; font-size:12px; border-bottom:1px solid var(--border); }\n    .dash-table tr:last-child td { border-bottom:none; }\n    .dash-table tr:hover td { background:#f0f7fd; }\n    .num-cell    { font-weight:700; text-align:right; }\n    .detail-cell { font-size:10px; color:var(--muted); }\n\n    /* ── Big stat card ── */\n    .big-stat        { text-align:center; padding:20px 16px; }\n    .big-stat-num    { font-size:58px; font-weight:900; line-height:1; color:var(--blue); }\n    .big-stat-unit   { font-size:13px; color:var(--muted); margin-top:3px; }\n    .big-stat-detail { margin-top:8px; font-size:11px; color:var(--muted); background:var(--surface2); border-radius:7px; padding:7px 12px; border:1px solid var(--border); }\n\n    /* ── Divider ── */\n    .divider { border:none; border-top:1px solid var(--border); margin:4px 0; }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header>\n  <div class=\"h-logo\"><img src=\"bd34f71a-748b-4827-aa7e-b3c0e014f38c\" alt=\"Rede Mário Gatti\"><\u002Fdiv>\n  <div class=\"h-title\">\n    <strong>Painel Hospitalar — Complexo Hospitalar Prefeito Edivaldo Orsi<\u002Fstrong>\n    <span>Internação · Ambulatório · Centro Cirúrgico · Dados exportados do AGHU<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"h-right\">\n    <div>\n      <div id=\"clock\">--:--:--<\u002Fdiv>\n      <div id=\"dateLabel\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main>\n\n  <!-- ══ KPI GLOBAL ══ -->\n  <div class=\"row5\">\n    <div class=\"kpi\" style=\"--accent:var(--blue)\">\n      <div class=\"kpi-icon\">🛏️<\u002Fdiv>\n      <div class=\"kpi-label\">Internados<\u002Fdiv>\n      <div class=\"kpi-value\" id=\"kpiInt\">205<\u002Fdiv>\n      <div class=\"kpi-sub\" id=\"kpiIntSexo\">112 masc · 93 fem<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\" style=\"--accent:var(--red)\">\n      <div class=\"kpi-icon\">⏱️<\u002Fdiv>\n      <div class=\"kpi-label\">Maior tempo internado<\u002Fdiv>\n      <div class=\"kpi-value\" id=\"kpiMaior\">671<\u002Fdiv>\n      <div class=\"kpi-sub\">dias · desde <span id=\"kpiMaiorData\">17/06/2024<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\" style=\"--accent:var(--yellow)\">\n      <div class=\"kpi-icon\">📅<\u002Fdiv>\n      <div class=\"kpi-label\">Amb. agendados<\u002Fdiv>\n      <div class=\"kpi-value\" id=\"kpiAmbAg\">481<\u002Fdiv>\n      <div class=\"kpi-sub\" id=\"kpiAmbFalt\">— faltaram<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\" style=\"--accent:var(--teal)\">\n      <div class=\"kpi-icon\">🔪<\u002Fdiv>\n      <div class=\"kpi-label\">Cirurgias programadas<\u002Fdiv>\n      <div class=\"kpi-value\" id=\"kpiCirTot\">55<\u002Fdiv>\n      <div class=\"kpi-sub\">unidades 14 e 20<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"kpi\" style=\"--accent:var(--lime)\">\n      <div class=\"kpi-icon\">✅<\u002Fdiv>\n      <div class=\"kpi-label\">Cirurgias realizadas<\u002Fdiv>\n      <div class=\"kpi-value\" id=\"kpiCirRzda\">28<\u002Fdiv>\n      <div class=\"kpi-sub\" id=\"kpiCirPct\">—% do programado<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ══ INTERNAÇÃO ══ -->\n  <div>\n    <div class=\"mod-header\">\n      <div class=\"mod-header-bar\" style=\"background:var(--blue)\"><\u002Fdiv>\n      <div>\n        <div class=\"mod-header-title\">Internação<\u002Fdiv>\n        <div class=\"mod-header-sub\">Pacientes atualmente internados · todas as unidades<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"row3\">\n      <div class=\"card\" style=\"grid-column:span 2\">\n        <div class=\"card-header\"><div class=\"section-title\" style=\"--accent:var(--blue);margin:0\">Por unidade funcional<\u002Fdiv><\u002Fdiv>\n        <div class=\"card-body\"><div class=\"hbar-list\" id=\"intUnidBars\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-header\"><div class=\"section-title\" style=\"--accent:var(--red);margin:0\">Maior tempo internado<\u002Fdiv><\u002Fdiv>\n        <div class=\"card-body\">\n          <div class=\"big-stat\">\n            <div class=\"big-stat-num\" id=\"bigTempo\">671<\u002Fdiv>\n            <div class=\"big-stat-unit\">dias internado<\u002Fdiv>\n            <div class=\"big-stat-detail\" id=\"bigTempoDetail\">Internado em 17/06/2024 08:30<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"row2\" style=\"margin-top:16px\">\n      <div class=\"card\">\n        <div class=\"card-header\"><div class=\"section-title\" style=\"--accent:var(--blue);margin:0\">Por sexo<\u002Fdiv><\u002Fdiv>\n        <div class=\"card-body\"><div class=\"chart-wrap\"><canvas id=\"chartIntSexo\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-header\"><div class=\"section-title\" style=\"--accent:var(--blue);margin:0\">Por faixa etária<\u002Fdiv><\u002Fdiv>\n        <div class=\"card-body\"><div class=\"chart-wrap\"><canvas id=\"chartIntIdade\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ══ AMBULATÓRIO ══ -->\n  <div>\n    <div class=\"mod-header\">\n      <div class=\"mod-header-bar\" style=\"background:var(--yellow)\"><\u002Fdiv>\n      <div>\n        <div class=\"mod-header-title\">Ambulatório — AMB ESP<\u002Fdiv>\n        <div class=\"mod-header-sub\">Consultas agendadas para hoje<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- KPIs ambulatório -->\n    <div class=\"row4\" style=\"margin-bottom:16px\">\n      <div class=\"kpi\" style=\"--accent:var(--yellow)\">\n        <div class=\"kpi-icon\">📋<\u002Fdiv>\n        <div class=\"kpi-label\">Agendados<\u002Fdiv>\n        <div class=\"kpi-value\" id=\"ambAgKpi\">481<\u002Fdiv>\n        <div class=\"kpi-sub\" id=\"ambAgSexo\">— masc · — fem<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi\" style=\"--accent:var(--red)\">\n        <div class=\"kpi-icon\">🚫<\u002Fdiv>\n        <div class=\"kpi-label\">Faltaram<\u002Fdiv>\n        <div class=\"kpi-value\" id=\"ambFaltKpi\">87<\u002Fdiv>\n        <div class=\"kpi-sub\" id=\"ambFaltPct\">—% dos agendados<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi\" style=\"--accent:var(--orange)\">\n        <div class=\"kpi-icon\">⏳<\u002Fdiv>\n        <div class=\"kpi-label\">Aguardando médico<\u002Fdiv>\n        <div class=\"kpi-value\" id=\"ambAguardKpi\">23<\u002Fdiv>\n        <div class=\"kpi-sub\" id=\"ambAguardSexo\">— masc · — fem<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi\" style=\"--accent:var(--lime)\">\n        <div class=\"kpi-icon\">📊<\u002Fdiv>\n        <div class=\"kpi-label\">Especialidades ativas<\u002Fdiv>\n        <div class=\"kpi-value\" id=\"ambEspKpi\">0<\u002Fdiv>\n        <div class=\"kpi-sub\">na agenda de hoje<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"row3\">\n      <div class=\"card\">\n        <div class=\"card-header\"><div class=\"section-title\" style=\"--accent:var(--yellow);margin:0\">Agendados por sexo<\u002Fdiv><\u002Fdiv>\n        <div class=\"card-body\"><div class=\"chart-wrap-sm\"><canvas id=\"chartAmbSexo\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-header\"><div class=\"section-title\" style=\"--accent:var(--yellow);margin:0\">Agendados por faixa etária<\u002Fdiv><\u002Fdiv>\n        <div class=\"card-body\"><div class=\"chart-wrap-sm\"><canvas id=\"chartAmbIdade\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-header\"><div class=\"section-title\" style=\"--accent:var(--red);margin:0\">Faltaram por sexo<\u002Fdiv><\u002Fdiv>\n        <div class=\"card-body\"><div class=\"chart-wrap-sm\"><canvas id=\"chartAmbFalt\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card\" style=\"margin-top:16px\">\n      <div class=\"card-header\"><div class=\"section-title\" style=\"--accent:var(--yellow);margin:0\">Agendados por especialidade · aguardando / faltaram<\u002Fdiv><\u002Fdiv>\n      <div class=\"card-body\" style=\"padding:0;overflow-x:auto\">\n        <table class=\"dash-table\" id=\"ambEspTable\"><\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ══ CENTRO CIRÚRGICO ══ -->\n  <div>\n    <div class=\"mod-header\">\n      <div class=\"mod-header-bar\" style=\"background:var(--teal)\"><\u002Fdiv>\n      <div>\n        <div class=\"mod-header-title\">Centro Cirúrgico — programação do dia<\u002Fdiv>\n        <div class=\"mod-header-sub\">Totais consolidados · detalhamento separado por unidade<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- KPIs CC consolidados -->\n    <div id=\"sitCards\" class=\"row4\" style=\"margin-bottom:16px\"><\u002Fdiv>\n\n    <!-- Detalhamento por unidade -->\n    <div class=\"row2\" id=\"ccUnidades\"><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fmain>\n\n<script>\n// ══════════════════════════════════════════════════════════════════\n// DADOS — substitua com os valores exportados do DBeaver\n// ══════════════════════════════════════════════════════════════════\n\n// ── Q7: Internação ────────────────────────────────────────────────\nconst INT = {\n  total: 205,\n  masc: 112, fem: 93,\n  maiorDias: 671, maiorData: '17/06/2024 08:30',\n  unidades: [\n    { nome:'Clínica Médica',      n: 78 },\n    { nome:'Cirurgia Geral',      n: 45 },\n    { nome:'UTI Adulto',          n: 32 },\n    { nome:'Pediatria',           n: 22 },\n    { nome:'Ortopedia e Trauma',  n: 18 },\n    { nome:'Outras unidades',     n: 10 },\n  ],\n  faixas: [\n    { f:'0-17', n:22 }, { f:'18-39', n:38 },\n    { f:'40-59', n:67 }, { f:'60-74', n:54 }, { f:'75+', n:24 },\n  ],\n};\n\n// ── Q5: Ambulatório ───────────────────────────────────────────────\nconst AMB = {\n  agendados: 481,  agendMasc: 225, agendFem: 256,\n  faltaram: 87,    faltMasc: 40,   faltFem: 47,\n  aguardando: 23,  aguardMasc: 10, aguardFem: 13,\n  agendFaixas: [\n    { f:'0-17', n:42 }, { f:'18-39', n:148 },\n    { f:'40-59', n:162 }, { f:'60-74', n:89 }, { f:'75+', n:40 },\n  ],\n  especialidades: [\n    { esp:'CLÍNICA MÉDICA',         total:98,  aguard:5, falt:18 },\n    { esp:'PEDIATRIA',              total:72,  aguard:3, falt:14 },\n    { esp:'GINECOLOGIA',            total:65,  aguard:4, falt:11 },\n    { esp:'ORTOPEDIA',              total:58,  aguard:2, falt:10 },\n    { esp:'CARDIOLOGIA',            total:47,  aguard:3, falt:9  },\n    { esp:'NEUROLOGIA',             total:38,  aguard:1, falt:7  },\n    { esp:'DERMATOLOGIA',           total:34,  aguard:2, falt:6  },\n    { esp:'ENDOCRINOLOGIA',         total:28,  aguard:1, falt:5  },\n    { esp:'OFTALMOLOGIA',           total:24,  aguard:2, falt:4  },\n    { esp:'OUTRAS',                 total:17,  aguard:0, falt:3  },\n  ],\n};\n\n// ── Q8: Centro Cirúrgico — dados separados por unidade ────────────\nconst CC_UNIDADES = [\n  {\n    seq: 14,\n    nome: 'CC — Bloco Cirúrgico',\n    cor: '#0d9488',\n    situacao: [\n      { cod:'AGND', label:'Agendada',        n:8  },\n      { cod:'CHAM', label:'Chamado',         n:2  },\n      { cod:'PREP', label:'Em Preparo',      n:1  },\n      { cod:'TRAN', label:'Transoperatório', n:3  },\n      { cod:'RZDA', label:'Realizada',       n:20 },\n      { cod:'CANC', label:'Cancelada',       n:4  },\n    ],\n    natureza: [\n      { nat:'Eletiva',n:26 }, { nat:'Urgência',n:8 },\n      { nat:'Emergência',n:3 }, { nat:'Aproveit. Sala',n:1 },\n    ],\n    especialidades: [\n      { esp:'CG — Cirurgia Geral',     n:12 },\n      { esp:'ORT — Ortopedia',         n:8  },\n      { esp:'VAS — Cirurgia Vascular', n:4  },\n      { esp:'NEU — Neurocirurgia',     n:2  },\n      { esp:'GIN — Ginecologia',       n:2  },\n      { esp:'OFT — Oftalmologia',      n:2  },\n      { esp:'URO — Urologia',          n:8  },\n    ],\n    procedimentos: [\n      { proc:'Colecistectomia Videolaparoscópica', n:5 },\n      { proc:'Osteossíntese de Fêmur',             n:4 },\n      { proc:'Apendicectomia',                     n:4 },\n      { proc:'Herniorrafia Inguinal',              n:3 },\n      { proc:'Laparotomia Exploradora',            n:2 },\n      { proc:'Safenectomia',                       n:2 },\n      { proc:'Amputação Transtibial',              n:2 },\n      { proc:'Tireoidectomia',                     n:2 },\n      { proc:'Nefrectomia',                        n:1 },\n      { proc:'Laminectomia',                       n:1 },\n    ],\n    cancelamentos: [\n      { motivo:'Falta de material',         n:2 },\n      { motivo:'Intercorrência clínica',    n:1 },\n      { motivo:'Motivo não informado',      n:1 },\n    ],\n  },\n  {\n    seq: 20,\n    nome: 'CC — Ambulatório Cirúrgico',\n    cor: '#7c3aed',\n    situacao: [\n      { cod:'AGND', label:'Agendada',        n:4 },\n      { cod:'CHAM', label:'Chamado',         n:1 },\n      { cod:'PREP', label:'Em Preparo',      n:1 },\n      { cod:'TRAN', label:'Transoperatório', n:1 },\n      { cod:'RZDA', label:'Realizada',       n:8 },\n      { cod:'CANC', label:'Cancelada',       n:2 },\n    ],\n    natureza: [\n      { nat:'Eletiva',n:12 }, { nat:'Urgência',n:3 },\n      { nat:'Emergência',n:1 }, { nat:'Aproveit. Sala',n:1 },\n    ],\n    especialidades: [\n      { esp:'GIN — Ginecologia',   n:6 },\n      { esp:'ORT — Ortopedia',     n:4 },\n      { esp:'URO — Urologia',      n:3 },\n      { esp:'CG — Cirurgia Geral', n:4 },\n    ],\n    procedimentos: [\n      { proc:'Artroscopia de Joelho',   n:4 },\n      { proc:'Histerectomia',           n:3 },\n      { proc:'Herniorrafia Inguinal',   n:2 },\n      { proc:'Adenoidectomia',          n:2 },\n      { proc:'Vasectomia',              n:2 },\n      { proc:'Exérese de Tumor Cutâneo',n:1 },\n      { proc:'Postectomia',             n:1 },\n      { proc:'Biópsia Excisional',      n:1 },\n      { proc:'Fistulectomia Anal',      n:1 },\n      { proc:'Redução de Fratura',      n:0 },\n    ],\n    cancelamentos: [\n      { motivo:'Paciente não compareceu', n:2 },\n    ],\n  },\n];\n\n// ══════════════════════════════════════════════════════════════════\n// HELPERS\n// ══════════════════════════════════════════════════════════════════\nconst BRAND  = ['#2B97D1','#E85A2A','#8CC63F','#F4C400','#0d9488','#7c3aed','#f97316','#06b6d4'];\nconst BRAND2 = ['#3b82f6','#f97316','#22c55e','#f59e0b','#a855f7','#ef4444','#0d9488','#6366f1'];\n\nfunction sitColor(c){ return{AGND:'#3b82f6',CHAM:'#f59e0b',PREP:'#f97316',TRAN:'#a855f7',RZDA:'#22c55e',CANC:'#ef4444'}[c]||'#9ca3af'; }\nfunction hbars(data, labelKey, valKey, colors, maxOverride){\n  const max = maxOverride || Math.max(...data.map(x=>x[valKey]), 1);\n  return data.map((x,i)=>`\n    <div class=\"hbar-row\">\n      <div class=\"hbar-label\" title=\"${x[labelKey]}\">${x[labelKey]}<\u002Fdiv>\n      <div class=\"hbar-track\">\n        <div class=\"hbar-fill\" style=\"width:${Math.max(x[valKey]/max*100,2)}%;background:${colors[i%colors.length]}\">${x[valKey]}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hbar-val\">${x[valKey]}<\u002Fdiv>\n    <\u002Fdiv>`).join('');\n}\n\n// ══════════════════════════════════════════════════════════════════\n// CLOCK\n// ══════════════════════════════════════════════════════════════════\nfunction tick(){\n  const n=new Date();\n  document.getElementById('clock').textContent=n.toLocaleTimeString('pt-BR');\n  document.getElementById('dateLabel').textContent=n.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});\n}\ntick(); setInterval(tick,1000);\n\n// ══════════════════════════════════════════════════════════════════\n// KPI GLOBAL\n// ══════════════════════════════════════════════════════════════════\nconst cirTotal = CC_UNIDADES.flatMap(u=>u.situacao).reduce((s,x)=>s+x.n,0);\nconst cirRzda  = CC_UNIDADES.flatMap(u=>u.situacao).filter(x=>x.cod==='RZDA').reduce((s,x)=>s+x.n,0);\n\ndocument.getElementById('kpiInt').textContent     = INT.total;\ndocument.getElementById('kpiIntSexo').textContent = `${INT.masc} masc · ${INT.fem} fem`;\ndocument.getElementById('kpiMaior').textContent   = INT.maiorDias;\ndocument.getElementById('kpiMaiorData').textContent = INT.maiorData.split(' ')[0];\ndocument.getElementById('kpiAmbAg').textContent   = AMB.agendados;\ndocument.getElementById('kpiAmbFalt').textContent = `${AMB.faltaram} faltaram (${Math.round(AMB.faltaram/AMB.agendados*100)}%)`;\ndocument.getElementById('kpiCirTot').textContent  = cirTotal;\ndocument.getElementById('kpiCirRzda').textContent = cirRzda;\ndocument.getElementById('kpiCirPct').textContent  = `${Math.round(cirRzda/cirTotal*100)}% do programado`;\n\n// ══════════════════════════════════════════════════════════════════\n// INTERNAÇÃO\n// ══════════════════════════════════════════════════════════════════\ndocument.getElementById('bigTempo').textContent       = INT.maiorDias;\ndocument.getElementById('bigTempoDetail').textContent = `Internado em ${INT.maiorData}`;\n\ndocument.getElementById('intUnidBars').innerHTML = hbars(INT.unidades,'nome','n',BRAND);\n\nnew Chart(document.getElementById('chartIntSexo'),{\n  type:'doughnut',\n  data:{labels:['Masculino','Feminino'],datasets:[{data:[INT.masc,INT.fem],backgroundColor:['#2B97D1','#E85A2A'],borderColor:'#fff',borderWidth:3,hoverOffset:6}]},\n  options:{responsive:true,maintainAspectRatio:false,cutout:'62%',\n    plugins:{legend:{position:'bottom',labels:{color:'#6b7280',padding:10,font:{size:11}}},\n      tooltip:{callbacks:{label:c=>` ${c.raw} (${Math.round(c.raw/INT.total*100)}%)`}}}}\n});\nnew Chart(document.getElementById('chartIntIdade'),{\n  type:'bar',\n  data:{labels:INT.faixas.map(x=>x.f),datasets:[{data:INT.faixas.map(x=>x.n),backgroundColor:BRAND,borderRadius:5,borderSkipped:false}]},\n  options:{responsive:true,maintainAspectRatio:false,\n    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw} pacientes`}}},\n    scales:{x:{ticks:{color:'#6b7280'},grid:{color:'#f0f0f0'}},y:{ticks:{color:'#6b7280'},grid:{color:'#f0f0f0'}}}}\n});\n\n// ══════════════════════════════════════════════════════════════════\n// AMBULATÓRIO\n// ══════════════════════════════════════════════════════════════════\ndocument.getElementById('ambAgKpi').textContent    = AMB.agendados;\ndocument.getElementById('ambAgSexo').textContent   = `${AMB.agendMasc} masc · ${AMB.agendFem} fem`;\ndocument.getElementById('ambFaltKpi').textContent  = AMB.faltaram;\ndocument.getElementById('ambFaltPct').textContent  = `${Math.round(AMB.faltaram/AMB.agendados*100)}% dos agendados`;\ndocument.getElementById('ambAguardKpi').textContent= AMB.aguardando;\ndocument.getElementById('ambAguardSexo').textContent=`${AMB.aguardMasc} masc · ${AMB.aguardFem} fem`;\ndocument.getElementById('ambEspKpi').textContent   = AMB.especialidades.length;\n\nnew Chart(document.getElementById('chartAmbSexo'),{\n  type:'doughnut',\n  data:{labels:['Masculino','Feminino'],datasets:[{data:[AMB.agendMasc,AMB.agendFem],backgroundColor:['#2B97D1','#E85A2A'],borderColor:'#fff',borderWidth:3,hoverOffset:6}]},\n  options:{responsive:true,maintainAspectRatio:false,cutout:'62%',\n    plugins:{legend:{position:'bottom',labels:{color:'#6b7280',padding:8,font:{size:10}}},\n      tooltip:{callbacks:{label:c=>` ${c.raw} (${Math.round(c.raw/AMB.agendados*100)}%)`}}}}\n});\nnew Chart(document.getElementById('chartAmbIdade'),{\n  type:'bar',\n  data:{labels:AMB.agendFaixas.map(x=>x.f),datasets:[{data:AMB.agendFaixas.map(x=>x.n),backgroundColor:BRAND,borderRadius:5,borderSkipped:false}]},\n  options:{responsive:true,maintainAspectRatio:false,\n    plugins:{legend:{display:false}},\n    scales:{x:{ticks:{color:'#6b7280'},grid:{color:'#f0f0f0'}},y:{ticks:{color:'#6b7280'},grid:{color:'#f0f0f0'}}}}\n});\nnew Chart(document.getElementById('chartAmbFalt'),{\n  type:'doughnut',\n  data:{labels:['Masculino','Feminino'],datasets:[{data:[AMB.faltMasc,AMB.faltFem],backgroundColor:['#f97316','#ef4444'],borderColor:'#fff',borderWidth:3,hoverOffset:6}]},\n  options:{responsive:true,maintainAspectRatio:false,cutout:'62%',\n    plugins:{legend:{position:'bottom',labels:{color:'#6b7280',padding:8,font:{size:10}}},\n      tooltip:{callbacks:{label:c=>` ${c.raw} (${Math.round(c.raw/AMB.faltaram*100)}%)`}}}}\n});\n\ndocument.getElementById('ambEspTable').innerHTML = `\n  <thead><tr><th>Especialidade<\u002Fth><th style=\"text-align:right\">Agendados<\u002Fth><th style=\"text-align:right\">Aguardando<\u002Fth><th style=\"text-align:right\">Faltaram<\u002Fth><\u002Ftr><\u002Fthead>\n  <tbody>${AMB.especialidades.map(r=>`\n    <tr>\n      <td style=\"font-weight:500\">${r.esp}<\u002Ftd>\n      <td class=\"num-cell\">${r.total}<\u002Ftd>\n      <td class=\"num-cell\" style=\"color:var(--orange)\">${r.aguard}<\u002Ftd>\n      <td class=\"num-cell\" style=\"color:var(--red)\">${r.falt}<\u002Ftd>\n    <\u002Ftr>`).join('')}\n  <\u002Ftbody>`;\n\n// ══════════════════════════════════════════════════════════════════\n// CENTRO CIRÚRGICO — KPIs consolidados\n// ══════════════════════════════════════════════════════════════════\nconst sitTotals = {};\nCC_UNIDADES.forEach(u=>u.situacao.forEach(s=>{ sitTotals[s.cod]=(sitTotals[s.cod]||{label:s.label,cod:s.cod,n:0}); sitTotals[s.cod].n+=s.n; }));\nconst sitOrder = ['AGND','CHAM','PREP','TRAN','RZDA','CANC'];\nconst sitIcons = {AGND:'📅',CHAM:'📢',PREP:'⚙️',TRAN:'🔬',RZDA:'✅',CANC:'❌'};\n\ndocument.getElementById('sitCards').innerHTML = sitOrder.map(cod=>{\n  const s=sitTotals[cod]; if(!s) return '';\n  return `<div class=\"kpi\" style=\"--accent:${sitColor(cod)}\">\n    <div class=\"kpi-icon\">${sitIcons[cod]||'•'}<\u002Fdiv>\n    <div class=\"kpi-label\">${s.label}<\u002Fdiv>\n    <div class=\"kpi-value\" style=\"font-size:24px\">${s.n}<\u002Fdiv>\n    <div class=\"kpi-sub\">${Math.round(s.n/cirTotal*100)}% do total<\u002Fdiv>\n  <\u002Fdiv>`;\n}).join('');\n\n// ══════════════════════════════════════════════════════════════════\n// CENTRO CIRÚRGICO — detalhamento por unidade\n// ══════════════════════════════════════════════════════════════════\ndocument.getElementById('ccUnidades').innerHTML = CC_UNIDADES.map((u,ui)=>{\n  const uTotal = u.situacao.reduce((s,x)=>s+x.n,0);\n  const uRzda  = u.situacao.find(x=>x.cod==='RZDA')?.n||0;\n  const uCanc  = u.situacao.find(x=>x.cod==='CANC')?.n||0;\n  const natColors = ['#2B97D1','#f97316','#ef4444','#0d9488','#7c3aed'];\n  const espColors = ui===0 ? BRAND : BRAND2;\n\n  return `\n  <div class=\"unit-panel\" style=\"--accent:${u.cor}\">\n    <div class=\"unit-panel-header\">\n      <div class=\"unit-panel-title\">Unidade ${u.seq} — ${u.nome}<\u002Fdiv>\n      <div class=\"unit-panel-sub\">${uTotal} cirurgias · ${uRzda} realizadas · ${uCanc} canceladas<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"unit-panel-body\">\n\n      <!-- Situação badges -->\n      <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n        ${u.situacao.map(s=>`\n          <span class=\"sit-badge s-${s.cod}\">\n            <span class=\"sit-dot\"><\u002Fspan>${s.label}: ${s.n}\n          <\u002Fspan>`).join('')}\n      <\u002Fdiv>\n\n      <!-- Natureza + especialidades -->\n      <div class=\"row2\" style=\"gap:12px\">\n        <div>\n          <div class=\"section-title\" style=\"--accent:${u.cor};margin-bottom:8px\">Por natureza<\u002Fdiv>\n          <div class=\"hbar-list\">${hbars(u.natureza,'nat','n',natColors)}<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"section-title\" style=\"--accent:${u.cor};margin-bottom:8px\">Por especialidade<\u002Fdiv>\n          <div class=\"hbar-list\">${hbars(u.especialidades,'esp','n',espColors)}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Top procedimentos -->\n      <div>\n        <div class=\"section-title\" style=\"--accent:${u.cor};margin-bottom:8px\">Top procedimentos<\u002Fdiv>\n        <div class=\"hbar-list\">${u.procedimentos.filter(x=>x.n>0).slice(0,8).map((x,i)=>`\n          <div class=\"hbar-row\">\n            <div class=\"hbar-label\" title=\"${x.proc}\" style=\"width:200px\">${i+1}. ${x.proc}<\u002Fdiv>\n            <div class=\"hbar-track\">\n              <div class=\"hbar-fill\" style=\"width:${Math.max(x.n/u.procedimentos[0].n*100,4)}%;background:${u.cor}\">${x.n}<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"hbar-val\">${x.n}<\u002Fdiv>\n          <\u002Fdiv>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Cancelamentos -->\n      <div>\n        <div class=\"section-title\" style=\"--accent:#ef4444;margin-bottom:8px\">Desmarcadas por motivo<\u002Fdiv>\n        <table class=\"dash-table\">\n          <thead><tr><th>Motivo<\u002Fth><th style=\"text-align:right\">Qtd<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>${u.cancelamentos.map(r=>`\n            <tr>\n              <td>${r.motivo}<\u002Ftd>\n              <td class=\"num-cell\" style=\"color:var(--red)\">${r.n}<\u002Ftd>\n            <\u002Ftr>`).join('')}\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}).join('');\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
