<script type="text/babel">

const BRAND = ['hsl(200 65% 50%)','hsl(17 80% 54%)','hsl(122 47% 42%)','hsl(47 91% 49%)','hsl(262 60% 55%)'];

// ── Simple SVG Charts ──────────────────────────────────────
function BarChartSimple({ data, dataKey, nameKey, height = 180 }) {
  const max = Math.max(...data.map(d => d[dataKey]));
  const w = 100 / data.length;
  return (
    <svg width="100%" height={height} style={{overflow:'visible'}}>
      {data.map((d, i) => {
        const barH = (d[dataKey] / max) * (height - 40);
        const x = i * w + w * 0.1;
        const barW = w * 0.8;
        return (
          <g key={i}>
            <rect x={`${x}%`} y={height - 30 - barH} width={`${barW}%`} height={barH}
              fill={BRAND[i % BRAND.length]} rx={4} />
            <text x={`${x + barW/2}%`} y={height - 14} textAnchor="middle"
              fontSize={10} fill="hsl(220 10% 45%)">{d[nameKey]}</text>
            <text x={`${x + barW/2}%`} y={height - 32 - barH} textAnchor="middle"
              fontSize={10} fill="hsl(222 25% 16%)" fontWeight={700}>{d[dataKey]}</text>
          </g>
        );
      })}
    </svg>
  );
}

function DonutChart({ data, dataKey, nameKey, colorFn, height = 180 }) {
  const total = data.reduce((s, d) => s + d[dataKey], 0);
  let angle = -Math.PI / 2;
  const cx = 50, cy = height / 2, R = height * 0.38, r = height * 0.22;
  const slices = data.map((d, i) => {
    const sweep = (d[dataKey] / total) * 2 * Math.PI;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(angle + sweep), y2 = cy + R * Math.sin(angle + sweep);
    const ix1 = cx + r * Math.cos(angle + sweep), iy1 = cy + r * Math.sin(angle + sweep);
    const ix2 = cx + r * Math.cos(angle), iy2 = cy + r * Math.sin(angle);
    const large = sweep > Math.PI ? 1 : 0;
    const path = `M${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} L${ix1},${iy1} A${r},${r} 0 ${large} 0 ${ix2},${iy2} Z`;
    const fill = colorFn ? colorFn(d, i) : BRAND[i % BRAND.length];
    angle += sweep;
    return <path key={i} d={path} fill={fill} stroke="white" strokeWidth={1} />;
  });
  return (
    <svg width="100%" height={height} viewBox={`0 0 100 ${height}`} preserveAspectRatio="xMidYMid meet">
      {slices}
    </svg>
  );
}

const PACS = [
  { sexo:'M', idade:72, grav:'AMARELO', loc:'OBSERVAÇÃO 2',        fa:'UPCG-0206-15-04-26', entrada:'2026-04-15T11:31:18' },
  { sexo:'M', idade:61, grav:'AMARELO', loc:'OBSERVAÇÃO 2',        fa:'UPCG-0219-15-04-26', entrada:'2026-04-15T12:01:42' },
  { sexo:'M', idade:40, grav:'LARANJA', loc:'OBSERVAÇÃO 2',        fa:'UPCG-0390-17-04-26', entrada:'2026-04-17T20:55:49' },
  { sexo:'M', idade:38, grav:'LARANJA', loc:'SALA DE EMERGÊNCIA',  fa:'UPCG-0409-17-04-26', entrada:'2026-04-17T22:19:02' },
  { sexo:'F', idade:77, grav:'LARANJA', loc:'SALA DE EMERGÊNCIA',  fa:'UPCG-0018-18-04-26', entrada:'2026-04-18T02:25:18' },
  { sexo:'F', idade:59, grav:'AMARELO', loc:'OBSERVAÇÃO 2',        fa:'UPCG-0220-18-04-26', entrada:'2026-04-18T13:25:18' },
  { sexo:'M', idade:66, grav:'AMARELO', loc:'OBSERVAÇÃO 2',        fa:'UPCG-0269-18-04-26', entrada:'2026-04-18T16:10:28' },
  { sexo:'M', idade:10, grav:'VERDE',   loc:'OBSERVAÇÃO PEDIÁTRICA',fa:'UPCG-0296-18-04-26',entrada:'2026-04-18T17:33:01' },
  { sexo:'M', idade:2,  grav:'AMARELO', loc:'OBSERVAÇÃO PEDIÁTRICA',fa:'UPCG-0300-18-04-26',entrada:'2026-04-18T17:48:44' },
  { sexo:'F', idade:20, grav:'AMARELO', loc:'SALA DE EMERGÊNCIA',  fa:'UPCG-0367-18-04-26', entrada:'2026-04-18T22:05:23' },
  { sexo:'M', idade:44, grav:'AMARELO', loc:'OBSERVAÇÃO 2',        fa:'UPCG-0252-19-04-26', entrada:'2026-04-19T18:59:17' },
  { sexo:'M', idade:30, grav:'AMARELO', loc:'SALA DE EMERGÊNCIA',  fa:'UPCG-0342-19-04-26', entrada:'2026-04-19T23:42:56' },
  { sexo:'M', idade:69, grav:'LARANJA', loc:'SALA DE EMERGÊNCIA',  fa:'UPCG-0012-20-04-26', entrada:'2026-04-20T02:26:11' },
];

const q1Faixas = [{f:'0-17',n:60},{f:'18-39',n:95},{f:'40-59',n:44},{f:'60-74',n:15},{f:'75+',n:9}];
const sexoData = [{name:'Feminino',value:117},{name:'Masculino',value:106}];

const locCounts = {};
PACS.forEach(p => { locCounts[p.loc] = (locCounts[p.loc]||0)+1; });
const locData = Object.entries(locCounts).sort((a,b)=>b[1]-a[1]).map(([name,value])=>({name,value}));

const gravCounts = {};
PACS.forEach(p => { gravCounts[p.grav] = (gravCounts[p.grav]||0)+1; });
const gravData = Object.entries(gravCounts).map(([name,value])=>({name,value}));
const GRAV_COLOR = { AMARELO:'hsl(47 91% 49%)', LARANJA:'hsl(17 80% 54%)', VERDE:'hsl(122 47% 42%)', AZUL:'hsl(200 65% 50%)' };

// Longest patient time for retaguarda sub-card
function longestRetaguarda() {
  const obs = PACS.filter(p => p.loc.startsWith('OBSERVAÇÃO'));
  if (!obs.length) return '—';
  const oldest = obs.reduce((a, b) => new Date(a.entrada) < new Date(b.entrada) ? a : b);
  const ms = Date.now() - new Date(oldest.entrada).getTime();
  const d = Math.floor(ms / 864e5), h = Math.floor((ms % 864e5) / 36e5), m = Math.floor((ms % 36e5) / 6e4);
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function EmergenciaPage() {
  const [,tick] = React.useState(0);
  React.useEffect(() => { const t = setInterval(()=>tick(v=>v+1),60000); return ()=>clearInterval(t); },[]);

  return (
    <main style={{maxWidth:1440,margin:'0 auto',padding:'20px 24px',display:'flex',flexDirection:'column',gap:24}}>
      {/* KPI Strip */}
      <section style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:16}}>

        <KpiCard icon="⏳" label="Aguardando classificação" value={46} sub={<>Maior espera: <strong>1h 20m</strong></>} accent="hsl(47 91% 49%)" />
        <KpiCard icon="🏥" label="Aguardando atendimento" value={47} sub={<>Maior espera: <strong>17h 15m</strong></>} accent="hsl(17 80% 54%)" />
        {/* Observation KPI — with retaguarda alert sub-card */}
        <div style={{background:'white',border:'1px solid hsl(220 18% 89%)',borderRadius:10,padding:16,position:'relative',overflow:'hidden',boxShadow:'0 1px 4px hsl(222 25% 16%/0.08),0 12px 30px hsl(222 25% 16%/0.06)',flex:1,minWidth:160}}>
          <div style={{width:36,height:36,borderRadius:8,background:'hsl(122 47% 42%/12%)',color:'hsl(122 47% 32%)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:8,fontSize:18}}>👥</div>
          <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.05em',color:'hsl(220 10% 45%)'}}>Em observação / emergência</div>
          <div style={{fontSize:28,fontWeight:800,lineHeight:1,marginTop:4,color:'hsl(222 25% 16%)'}}>26</div>
          <div style={{fontSize:10,color:'hsl(220 10% 45%)',marginTop:6}}>Pacientes no sistema</div>
          {/* Retaguarda alert */}
          <div style={{marginTop:10,background:'hsl(0 84% 60%/10%)',border:'1px solid hsl(0 84% 60%/35%)',borderRadius:7,padding:'8px 10px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
            <div>
              <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'0.05em',color:'hsl(0 84% 45%)',fontWeight:700}}>⚠ Maior tempo em retaguarda</div>
              <div style={{fontSize:17,fontWeight:800,color:'hsl(0 84% 50%)',lineHeight:1,marginTop:3}}>{longestRetaguarda()}</div>
              <div style={{fontSize:9,color:'hsl(0 84% 50%)',marginTop:2,opacity:0.8}}>UPCG-0206-15-04-26 · OBS 2</div>
            </div>
            <div style={{fontSize:22}}>🚨</div>
          </div>
          <div style={{position:'absolute',bottom:0,left:0,right:0,height:4,background:'hsl(122 47% 42%)'}} />
        </div>
      </section>

      {/* Section 1 — Fichas abertas */}
      <section>
        <SectionTitle accent="hsl(200 65% 50%)">Fichas abertas no dia — 223 total</SectionTitle>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <PanelCard title="Por sexo" accent="hsl(200 65% 50%)">
            <DonutChart
              data={sexoData} dataKey="value" nameKey="name" height={180}
              colorFn={(_,i) => ['hsl(17 80% 54%)','hsl(200 65% 50%)'][i]}

            <div style={{display:'flex',justifyContent:'center',gap:16,fontSize:11,color:'hsl(220 10% 45%)',marginTop:4}}>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:'50%',background:'hsl(17 80% 54%)',display:'inline-block'}}/>Feminino 117</span>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:'50%',background:'hsl(200 65% 50%)',display:'inline-block'}}/>Masculino 106</span>
            </div>
          </PanelCard>
          <PanelCard title="Por faixa etária" accent="hsl(200 65% 50%)">
            <BarChartSimple data={q1Faixas} dataKey="n" nameKey="f" height={200} />
          </PanelCard>
        </div>
      </section>

      {/* Section 2 — Em observação */}
      <section>
        <SectionTitle accent="hsl(122 47% 42%)">Pacientes em observação / emergência — {PACS.length} registros</SectionTitle>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          <PanelCard title="Por localização" accent="hsl(122 47% 42%)">
            <BarChartSimple data={locData} dataKey="value" nameKey="name" height={180} />
          </PanelCard>
          <PanelCard title="Por gravidade" accent="hsl(122 47% 42%)">
            <DonutChart data={gravData} dataKey="value" nameKey="name" height={180}
              colorFn={(d) => GRAV_COLOR[d.name] || 'hsl(220 18% 89%)'}
            />
            <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:10,fontSize:11,color:'hsl(220 10% 45%)',marginTop:4}}>
              {gravData.map(g=><span key={g.name} style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:'50%',background:GRAV_COLOR[g.name],display:'inline-block'}}/>{g.name} {g.value}</span>)}
            </div>
          </PanelCard>
        </div>
        <EmergencyTable patients={PACS} />
      </section>
    </main>
  );
}

function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('rmg-page') || 'map');
  const handleNav = (id) => { setPage(id); localStorage.setItem('rmg-page', id); };

  const baseTitle = 'Produção das unidades — Rede Mário Gatti';
  const baseSub = 'Unidades hospitalares e UPAs — Campinas/SP';

  const getSubtitle = () => {
    if (page.startsWith('upcg:')) {
      const unit = page.split(':')[1];
      return `Detalhamento Urgência · ${unit.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}`;
    }
    if (page.startsWith('hospital:')) {
      const unit = page.split(':')[1];
      return `Detalhamento Hospitalar · ${unit.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}`;
    }
    return baseSub;
  };

  const showMap = page === 'map';
  const showUpcg = page === 'upcg' || page.startsWith('upcg:');
  const showHosp = page === 'hospital' || page.startsWith('hospital:');

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <AppHeader title={baseTitle} subtitle={getSubtitle()} activePage={page} onNav={handleNav} />
      {showMap && (
        <main style={{maxWidth:1440,margin:'0 auto',padding:'20px 24px',display:'flex',flexDirection:'column',flex:1,gap:0,width:'100%'}}>
          <MapView />
        </main>
      )}
      {showUpcg && <EmergenciaPage />}
      {showHosp && (
        <div style={{flex:1,display:'flex',flexDirection:'column'}}>
          <iframe
            src="HospitalDetail.html"
            style={{flex:1,border:'none',width:'100%',minHeight:'calc(100vh - 96px)'}}
            title="Painel Hospitalar"
          />
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
