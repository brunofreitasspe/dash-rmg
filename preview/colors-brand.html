<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; font-family: "Segoe UI", system-ui, sans-serif; background: hsl(220 25% 95%); display: flex; flex-wrap: wrap; gap: 10px; }
  .swatch { border-radius: 8px; overflow: hidden; border: 1px solid hsl(220 18% 89%); background: white; min-width: 130px; flex: 1; }
  .color-block { height: 64px; }
  .swatch-info { padding: 8px 10px; }
  .name { font-size: 11px; font-weight: 700; color: hsl(222 25% 16%); }
  .val { font-size: 10px; color: hsl(220 10% 45%); margin-top: 2px; }
  .use { font-size: 10px; color: hsl(220 10% 55%); margin-top: 1px; }
</style></head><body>
<div class="swatch"><div class="color-block" style="background:hsl(200 65% 50%)"></div><div class="swatch-info"><div class="name">Brand Blue</div><div class="val">hsl(200 65% 50%)</div><div class="use">Primary, active nav, focus</div></div></div>
<div class="swatch"><div class="color-block" style="background:hsl(47 91% 49%)"></div><div class="swatch-info"><div class="name">Brand Yellow</div><div class="val">hsl(47 91% 49%)</div><div class="use">Triage AMARELO, waiting</div></div></div>
<div class="swatch"><div class="color-block" style="background:hsl(122 47% 42%)"></div><div class="swatch-info"><div class="name">Brand Lime</div><div class="val">hsl(122 47% 42%)</div><div class="use">Hospitals, Manchester VERDE</div></div></div>
<div class="swatch"><div class="color-block" style="background:hsl(17 80% 54%)"></div><div class="swatch-info"><div class="name">Brand Orange</div><div class="val">hsl(17 80% 54%)</div><div class="use">UPAs, Manchester LARANJA</div></div></div>
</body></html>
