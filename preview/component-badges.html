<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; font-family: "Segoe UI", system-ui, sans-serif; background: hsl(220 25% 95%); }
  .section { margin-bottom: 14px; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: hsl(220 10% 45%); margin-bottom: 8px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 9999px; border: 1px solid; padding: 3px 10px; font-size: 11px; font-weight: 700; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .map-badge { border-radius: 9999px; border: 0; padding: 4px 12px; font-size: 11px; font-weight: 700; color: white; display: inline-flex; align-items: center; gap: 5px; }
  .loc { background: hsl(210 28% 97%); border: 1px solid hsl(220 18% 89%); border-radius: 6px; padding: 2px 8px; font-size: 11px; color: hsl(220 10% 45%); }
</style></head><body>
<div class="section">
  <div class="section-label">Manchester Triage Badges</div>
  <div class="row">
    <span class="badge" style="background:hsl(17 80% 54%/15%);color:hsl(17 80% 44%);border-color:hsl(17 80% 54%/40%)"><span class="dot" style="background:hsl(17 80% 54%)"></span>LARANJA</span>
    <span class="badge" style="background:hsl(47 91% 49%/15%);color:hsl(47 80% 38%);border-color:hsl(47 91% 49%/40%)"><span class="dot" style="background:hsl(47 91% 49%)"></span>AMARELO</span>
    <span class="badge" style="background:hsl(122 47% 42%/15%);color:hsl(122 47% 28%);border-color:hsl(122 47% 42%/40%)"><span class="dot" style="background:hsl(122 47% 42%)"></span>VERDE</span>
    <span class="badge" style="background:hsl(200 65% 50%/15%);color:hsl(200 65% 35%);border-color:hsl(200 65% 50%/40%)"><span class="dot" style="background:hsl(200 65% 50%)"></span>AZUL</span>
  </div>
</div>
<div class="section">
  <div class="section-label">Map Unit Badges</div>
  <div class="row">
    <span class="map-badge" style="background:hsl(122 47% 42%)">✚ Hospital</span>
    <span class="map-badge" style="background:hsl(17 80% 54%)">◉ UPA</span>
  </div>
</div>
<div class="section">
  <div class="section-label">Location Tags</div>
  <div class="row">
    <span class="loc">SALA DE EMERGÊNCIA</span>
    <span class="loc">OBSERVAÇÃO 1</span>
    <span class="loc">OBSERVAÇÃO 2</span>
    <span class="loc">OBSERVAÇÃO PEDIÁTRICA</span>
    <span class="loc">OBSERVAÇÃO EMERGÊNCIA</span>
  </div>
</div>
</body></html>
