<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; font-family: "Segoe UI", system-ui, sans-serif; background: hsl(220 25% 95%); display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
  .badge-group { background: white; border: 1px solid hsl(220 18% 89%); border-radius: 8px; padding: 12px 14px; flex: 1; min-width: 120px; }
  .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: hsl(220 10% 45%); margin-bottom: 8px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 9999px; border: 1px solid; padding: 3px 10px; font-size: 11px; font-weight: 700; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .swatch-strip { height: 6px; border-radius: 3px; margin-top: 8px; }
</style></head><body>
<div class="badge-group">
  <div class="label">AMARELO</div>
  <span class="badge" style="background:hsl(47 91% 49%/15%);color:hsl(47 91% 40%);border-color:hsl(47 91% 49%/40%)"><span class="dot" style="background:hsl(47 91% 49%)"></span>AMARELO</span>
  <div class="swatch-strip" style="background:hsl(47 91% 49%)"></div>
</div>
<div class="badge-group">
  <div class="label">LARANJA</div>
  <span class="badge" style="background:hsl(17 80% 54%/15%);color:hsl(17 80% 44%);border-color:hsl(17 80% 54%/40%)"><span class="dot" style="background:hsl(17 80% 54%)"></span>LARANJA</span>
  <div class="swatch-strip" style="background:hsl(17 80% 54%)"></div>
</div>
<div class="badge-group">
  <div class="label">VERDE</div>
  <span class="badge" style="background:hsl(122 47% 42%/15%);color:hsl(122 47% 32%);border-color:hsl(122 47% 42%/40%)"><span class="dot" style="background:hsl(122 47% 42%)"></span>VERDE</span>
  <div class="swatch-strip" style="background:hsl(122 47% 42%)"></div>
</div>
<div class="badge-group">
  <div class="label">AZUL</div>
  <span class="badge" style="background:hsl(200 65% 50%/15%);color:hsl(200 65% 35%);border-color:hsl(200 65% 50%/40%)"><span class="dot" style="background:hsl(200 65% 50%)"></span>AZUL</span>
  <div class="swatch-strip" style="background:hsl(200 65% 50%)"></div>
</div>
</body></html>
