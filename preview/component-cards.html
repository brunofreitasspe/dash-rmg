<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; font-family: "Segoe UI", system-ui, sans-serif; background: hsl(220 25% 95%); display: flex; gap: 12px; flex-direction: column; }
  .panel { background: white; border: 1px solid hsl(220 18% 89%); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px hsl(222 25% 16%/0.08), 0 12px 30px hsl(222 25% 16%/0.06); }
  .panel-header { background: hsl(210 28% 97%); border-bottom: 1px solid hsl(220 18% 89%); padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
  .accent-bar { width: 4px; height: 14px; border-radius: 2px; flex-shrink: 0; }
  .panel-title { font-size: 13px; font-weight: 700; color: hsl(222 25% 16%); }
  .panel-body { padding: 14px; }
  .stat-row { background: hsl(210 28% 97%); border: 1px solid hsl(220 18% 89%); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .stat-label { font-size: 13px; color: hsl(222 25% 16%); }
  .stat-right { display: flex; gap: 12px; align-items: center; }
  .stat-wait { font-size: 10px; color: hsl(17 80% 44%); }
  .stat-val { font-size: 18px; font-weight: 800; color: hsl(222 25% 16%); }
  .section-title { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: hsl(220 10% 45%); margin-bottom: 10px; }
</style></head><body>

<div class="section-title">
  <div style="width:4px;height:14px;border-radius:2px;background:hsl(17 80% 54%)"></div>
  Aguardando atendimento médico — 47 pacientes
</div>

<div class="panel">
  <div class="panel-header">
    <div class="accent-bar" style="background:hsl(17 80% 54%)"></div>
    <div class="panel-title">Por sexo · maior espera</div>
  </div>
  <div class="panel-body">
    <div class="stat-row">
      <div class="stat-label">Masculino</div>
      <div class="stat-right"><div class="stat-wait">↑ 17h 15m</div><div class="stat-val">27</div></div>
    </div>
    <div class="stat-row" style="margin-bottom:0">
      <div class="stat-label">Feminino</div>
      <div class="stat-right"><div class="stat-wait">↑ 11h 30m</div><div class="stat-val">20</div></div>
    </div>
  </div>
</div>

</body></html>
