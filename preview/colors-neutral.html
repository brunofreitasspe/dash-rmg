<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; font-family: "Segoe UI", system-ui, sans-serif; background: hsl(220 25% 95%); display: flex; flex-wrap: wrap; gap: 10px; }
  .swatch { border-radius: 8px; overflow: hidden; border: 1px solid hsl(220 18% 89%); background: white; min-width: 120px; flex: 1; }
  .color-block { height: 52px; }
  .swatch-info { padding: 7px 9px; }
  .name { font-size: 11px; font-weight: 700; color: hsl(222 25% 16%); }
  .val { font-size: 10px; color: hsl(220 10% 45%); margin-top: 2px; font-family: monospace; }
  .use { font-size: 10px; color: hsl(220 10% 55%); margin-top: 1px; }
</style></head><body>
<div class="swatch"><div class="color-block" style="background:hsl(220 25% 95%)"></div><div class="swatch-info"><div class="name">Background</div><div class="val">220 25% 95%</div><div class="use">Page bg</div></div></div>
<div class="swatch"><div class="color-block" style="background:white; border-bottom: 1px solid hsl(220 18% 89%)"></div><div class="swatch-info"><div class="name">Panel</div><div class="val">0 0% 100%</div><div class="use">Card surface</div></div></div>
<div class="swatch"><div class="color-block" style="background:hsl(210 28% 97%)"></div><div class="swatch-info"><div class="name">Secondary</div><div class="val">210 28% 97%</div><div class="use">Stat rows, headers</div></div></div>
<div class="swatch"><div class="color-block" style="background:hsl(220 18% 89%)"></div><div class="swatch-info"><div class="name">Border</div><div class="val">220 18% 89%</div><div class="use">Cards, inputs</div></div></div>
<div class="swatch"><div class="color-block" style="background:hsl(220 10% 45%)"></div><div class="swatch-info"><div class="name">Muted FG</div><div class="val">220 10% 45%</div><div class="use">Labels, secondary text</div></div></div>
<div class="swatch"><div class="color-block" style="background:hsl(222 25% 16%)"></div><div class="swatch-info"><div class="name">Foreground</div><div class="val">222 25% 16%</div><div class="use">Body text, headings</div></div></div>
</body></html>
