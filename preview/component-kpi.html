<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px; font-family: "Segoe UI", system-ui, sans-serif; background: hsl(220 25% 95%); display: flex; gap: 10px; flex-wrap: wrap; }
  .kpi { background: white; border: 1px solid hsl(220 18% 89%); border-radius: 10px; padding: 16px; min-width: 140px; flex: 1; position: relative; overflow: hidden; box-shadow: 0 1px 4px hsl(222 25% 16%/0.08), 0 12px 30px hsl(222 25% 16%/0.06); }
  .icon-box { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; font-size: 16px; }
  .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: hsl(220 10% 45%); }
  .kpi-val { font-size: 28px; font-weight: 800; line-height: 1; margin-top: 4px; color: hsl(222 25% 16%); }
  .kpi-sub { font-size: 10px; color: hsl(220 10% 45%); margin-top: 6px; }
  .strip { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; }
</style></head><body>

<div class="kpi">
  <div class="icon-box" style="background:hsl(200 65% 50%/12%);color:hsl(200 65% 50%)">📋</div>
  <div class="kpi-label">Fichas abertas hoje</div>
  <div class="kpi-val">223</div>
  <div class="kpi-sub">117 feminino · 106 masculino</div>
  <div class="strip" style="background:hsl(200 65% 50%)"></div>
</div>

<div class="kpi">
  <div class="icon-box" style="background:hsl(47 91% 49%/12%);color:hsl(47 80% 40%)">⏳</div>
  <div class="kpi-label">Aguardando classificação</div>
  <div class="kpi-val">46</div>
  <div class="kpi-sub">Maior espera: <strong>1h 20m</strong></div>
  <div class="strip" style="background:hsl(47 91% 49%)"></div>
</div>

<div class="kpi">
  <div class="icon-box" style="background:hsl(17 80% 54%/12%);color:hsl(17 80% 44%)">🏥</div>
  <div class="kpi-label">Aguardando atendimento</div>
  <div class="kpi-val">47</div>
  <div class="kpi-sub">Maior espera: <strong>17h 15m</strong></div>
  <div class="strip" style="background:hsl(17 80% 54%)"></div>
</div>

<div class="kpi" style="min-width:180px">
  <div class="icon-box" style="background:hsl(122 47% 42%/12%);color:hsl(122 47% 32%)">👥</div>
  <div class="kpi-label">Em observação / emergência</div>
  <div class="kpi-val">26</div>
  <div class="kpi-sub">Pacientes no sistema</div>
  <!-- sub-card: maior tempo em retaguarda — dados reais da tabela, alerta vermelho -->
  <div style="margin-top:10px;background:hsl(0 84% 60%/10%);border:1px solid hsl(0 84% 60%/35%);border-radius:7px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px">
    <div>
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.05em;color:hsl(0 84% 45%);font-weight:700">⚠ Maior tempo em retaguarda</div>
      <div style="font-size:17px;font-weight:800;color:hsl(0 84% 50%);line-height:1;margin-top:3px" id="retaguarda-time">—</div>
      <div style="font-size:9px;color:hsl(0 84% 50%);margin-top:2px;opacity:0.8" id="retaguarda-pac">UPCG-0206-15-04-26 · OBSERVAÇÃO 2</div>
    </div>
    <div style="font-size:20px">🚨</div>
  </div>
  <div class="strip" style="background:hsl(122 47% 42%)"></div>
</div>

</body>
<script>
// Patient data from PACS table (retaguarda patients only — OBSERVAÇÃO locations)
const PACS = [
  { fa:'UPCG-0206-15-04-26', loc:'OBSERVAÇÃO 2',           entrada:'2026-04-15T11:31:18' },
  { fa:'UPCG-0219-15-04-26', loc:'OBSERVAÇÃO 2',           entrada:'2026-04-15T12:01:42' },
  { fa:'UPCG-0271-15-04-26', loc:'OBSERVAÇÃO 2',           entrada:'2026-04-15T13:54:59' },
  { fa:'UPCG-0283-15-04-26', loc:'OBSERVAÇÃO 2',           entrada:'2026-04-15T14:41:08' },
  { fa:'UPCG-0299-17-04-26', loc:'OBSERVAÇÃO 2',           entrada:'2026-04-17T16:17:03' },
  { fa:'UPCG-0390-17-04-26', loc:'OBSERVAÇÃO 2',           entrada:'2026-04-17T20:55:49' },
  { fa:'UPCG-0421-17-04-26', loc:'OBSERVAÇÃO 1',           entrada:'2026-04-17T23:04:45' },
  { fa:'UPCG-0220-18-04-26', loc:'OBSERVAÇÃO 2',           entrada:'2026-04-18T13:25:18' },
  { fa:'UPCG-0269-18-04-26', loc:'OBSERVAÇÃO 2',           entrada:'2026-04-18T16:10:28' },
  { fa:'UPCG-0296-18-04-26', loc:'OBSERVAÇÃO PEDIÁTRICA',  entrada:'2026-04-18T17:33:01' },
  { fa:'UPCG-0300-18-04-26', loc:'OBSERVAÇÃO PEDIÁTRICA',  entrada:'2026-04-18T17:48:44' },
  { fa:'UPCG-0197-18-04-26', loc:'OBSERVAÇÃO EMERGÊNCIA',  entrada:'2026-04-18T12:17:45' },
  { fa:'UPCG-0252-19-04-26', loc:'OBSERVAÇÃO 2',           entrada:'2026-04-19T18:59:17' },
];

const oldest = PACS.reduce((a, b) => new Date(a.entrada) < new Date(b.entrada) ? a : b);
const ms = Date.now() - new Date(oldest.entrada).getTime();
const d = Math.floor(ms / 864e5);
const h = Math.floor((ms % 864e5) / 36e5);
const m = Math.floor((ms % 36e5) / 6e4);
const label = d > 0 ? `${d}d ${h}h` : h > 0 ? `${h}h ${m}m` : `${m}m`;

document.getElementById('retaguarda-time').textContent = label;
document.getElementById('retaguarda-pac').textContent = `${oldest.fa} · ${oldest.loc}`;
</script>
</html>
